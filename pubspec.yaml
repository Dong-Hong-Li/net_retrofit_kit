name: net_retrofit_kit
description: "基于 Dio 的声明式 HTTP 客户端：用注解定义 API 接口并自动生成实现，少写样板代码，支持多 Client、自定义响应解析与统一错误处理，便于接入现有项目。"
version: 0.2.1
repository: https://github.com/Dong-Hong-Li/net_retrofit_kit
homepage: https://github.com/Dong-Hong-Li/net_retrofit_kit
documentation: https://github.com/Dong-Hong-Li/net_retrofit_kit#readme
topics:
  - flutter
  - networking
  - retrofit
  - code-generation
  - dio
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ">=5.0.0 <6.0.0"
  analyzer: ">=8.1.1 <11.0.0"
  build: ">=3.0.0 <5.0.0"
  source_gen: ">=4.2.0 <5.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  build_runner: ">=2.4.15 <3.0.0" 