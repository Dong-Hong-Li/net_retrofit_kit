name: net_retrofit_kit
description: "Declarative HTTP client built on Dio: define APIs with annotations and generate implementations with build_runner. Supports multiple clients, custom parsing, and unified error handling."
version: 0.2.3
repository: https://github.com/Dong-Hong-Li/net_retrofit_kit
homepage: https://github.com/Dong-Hong-Li/net_retrofit_kit
documentation: https://github.com/Dong-Hong-Li/net_retrofit_kit#readme
topics:
  - flutter
  - networking
  - retrofit
  - code-generation
  - dio
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ">=5.0.0 <6.0.0"
  analyzer: ">=8.1.1 <12.0.0"
  build: ">=3.0.0 <5.0.0"
  source_gen: ">=4.2.0 <5.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=5.0.0 <7.0.0"
  build_runner: ">=2.4.15 <3.0.0" 