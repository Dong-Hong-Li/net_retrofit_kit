name: Release

# 什么时候跑这个工作流
on:
  push:
    # 推代码到 main 时，或推送以 v 开头的 tag（如 v0.2.8）时
    branches: [main]
    tags: ['v*']
    # 只有这些目录/文件有改动才跑（避免改 README 也跑一遍）；
    paths:
      - 'pubspec.yaml'
      - 'lib/**'
      - 'test/**'
  pull_request:
    # 有人提 PR 到 main 时
    branches: [main]
    # 只有这些目录/文件有改动才跑（避免改 README 也跑一遍）
    paths:
      - 'pubspec.yaml'
      - 'lib/**'
      - 'test/**'

jobs:
  # 任务一：跑测试（不发布）
  test:
    name: Test
    runs-on: ubuntu-latest
    # 只有「不是 tag 推送」时才跑（tag 推送交给下面的 publish 任务）
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      # 拉取当前仓库代码
      - uses: actions/checkout@v4

      # 安装 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 安装项目依赖
      - name: Install dependencies
        run: flutter pub get

      # 执行所有测试
      - name: Run tests
        run: flutter test

  # 任务二：发布到 pub.dev（只有推送了 v 开头的 tag（如 vx.x.x）时才跑）
  publish:
    name: Publish to pub.dev
    runs-on: ubuntu-latest
    # 只有推送了 v 开头的 tag（如 v0.2.8）时才跑
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # 安装 Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      # 安装项目依赖
      - name: Install dependencies
        run: flutter pub get
      
      # 格式化代码
      - name: Format code
        run: dart format .
      
      # 测试
      - name: Run tests
        run: flutter test

      # 静态检查
      - name: Static analysis 
        run: flutter analyze

      # 生成代码
      - name: Generate code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # # 发布到 pub.dev；需要先在仓库 Settings → Secrets 里配置 PUB_DEV_TOKEN
      # - name: Publish to pub.dev
      #   run: dart pub publish --force
      #   env:
      #     PUB_DEV_TOKEN: ${{ secrets.PUB_DEV_TOKEN }}

  # 构建结果通知：在 Actions 运行页的 Summary 里显示各任务状态（成功/失败/跳过）
  notify:
    name: 构建结果通知
    runs-on: ubuntu-latest
    needs: [test, publish]
    # test 或 publish 任一完成（含跳过）就跑；只有用户手动取消时才不跑
    if: always() && (needs.test.result != 'cancelled' || needs.publish.result != 'cancelled')
    steps:
      - name: 写入构建结果
        run: |
          echo "## 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 任务 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "触发: \`${{ github.event_name }}\` @ \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
